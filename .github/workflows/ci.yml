name: CI

on:
  push:
    branches: [main]
    paths:
      - '**.rs'
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - '**.rs'
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - '.github/workflows/ci.yml'

env:
  CARGO_TERM_COLOR: always
  RUST_NIGHTLY_VERSION: nightly-2025-03-03

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          df -h

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: ${{ env.RUST_NIGHTLY_VERSION }}
          components: rustfmt, clippy

      - name: Check formatting
        run: cargo +${{ env.RUST_NIGHTLY_VERSION }} fmt --all --check

      - name: Add LLVM repository and key
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          echo "deb http://apt.llvm.org/$(lsb_release -cs)/ llvm-toolchain-$(lsb_release -cs)-22 main" | sudo tee /etc/apt/sources.list.d/llvm-22.list
          sudo apt-get update

      - name: Install LLVM 22 and MLIR for inkwell and melior
        run: |
          sudo apt-get install -y \
            llvm-22 llvm-22-dev llvm-22-runtime \
            clang-22 libclang-22-dev \
            libmlir-22-dev mlir-22-tools \
            libpolly-22-dev

      - name: Install additional dependencies
        run: |
          sudo apt-get install -y zlib1g-dev libzstd-dev

      - name: Clean up apt cache
        run: |
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*
          df -h

      - name: Set LLVM environment variables
        run: |
          echo "LLVM_SYS_221_PREFIX=/usr/lib/llvm-22" >> $GITHUB_ENV
          echo "LLVM_SYS_220_PREFIX=/usr/lib/llvm-22" >> $GITHUB_ENV
          echo "MLIR_SYS_220_PREFIX=/usr/lib/llvm-22" >> $GITHUB_ENV
          echo "TABLEGEN_220_PREFIX=/usr/lib/llvm-22" >> $GITHUB_ENV

      - name: Setup stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Verify clippy installation
        run: rustup component add clippy --toolchain stable

      - name: Run clippy
        run: cargo +stable clippy --all -- -D warnings

      - name: Run tests
        run: cargo test --all
